<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OG Image — iscooked.com</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            width: 1200px;
            height: 630px;
            background: #0a0a0a;
            font-family: 'SF Mono', 'Fira Code', 'JetBrains Mono', 'Cascadia Code', monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        .main-title {
            font-size: 80px;
            font-weight: 800;
            color: #fff;
            margin-bottom: 16px;
        }
        .main-title .fire { color: #ff4444; }

        .subtitle {
            font-size: 24px;
            color: #666;
            margin-bottom: 48px;
        }

        .terminal {
            background: #111;
            border: 1px solid #1a1a1a;
            border-radius: 10px;
            width: 700px;
            overflow: hidden;
        }
        .terminal-header {
            background: #161616;
            padding: 10px 16px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .dot { width: 12px; height: 12px; border-radius: 50%; }
        .dot.r { background: #ff5f57; }
        .dot.y { background: #febc2e; }
        .dot.g { background: #28c840; }
        .terminal-body {
            padding: 16px 20px;
            font-size: 14px;
            line-height: 1.8;
        }
        .red { color: #ff4444; font-weight: 700; }
        .green { color: #00ff88; }
        .yellow { color: #ffaa00; }
        .dim { color: #555; }
        .bold { font-weight: 700; }
        .white { color: #fff; font-weight: 700; }

        .url {
            position: absolute;
            bottom: 32px;
            font-size: 20px;
            color: #00ff88;
            font-weight: 700;
        }
    </style>
</head>
<body>
    <div class="main-title">🔥 Am I <span class="fire">Cooked</span>?</div>
    <div class="subtitle">One-command security scanner for local AI</div>

    <div class="terminal">
        <div class="terminal-header">
            <div class="dot r"></div>
            <div class="dot y"></div>
            <div class="dot g"></div>
        </div>
        <div class="terminal-body">
            <div><span class="red">🔥 COOKED</span>  <span class="dim">Ollama listening on ALL interfaces</span></div>
            <div><span class="green">✅ SAFE</span>    <span class="dim">LM Studio bound to localhost</span></div>
            <div><span class="yellow">⚠  WARMING UP</span>  <span class="dim">No authentication on API</span></div>
            <div style="margin-top: 8px;">
                <span class="white">73%</span> <span class="dim">cooked</span>  <span class="red">[██████████████████████████████</span><span class="dim">          ]</span>
            </div>
        </div>
    </div>

    <div class="url">iscooked.com</div>
</body>
</html>
